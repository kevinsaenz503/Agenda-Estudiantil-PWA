<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estudiantil</title>

    <link rel="stylesheet" href="css/style.css">
    
    <link rel="manifest" href="/manifest.webmanifest">

<meta name="theme-color" content="#1565C0">

<link rel="icon" href="/img/icon-192.png">
</head>

<body>

<div class="container">

    <!-- Menú lateral -->
    <aside class="sidebar">

        <h2>📚 Agenda</h2>

        <ul>

<li class="activo"><a th:href="@{/}">🏠 Inicio</a></li>

<li><a th:href="@{/materias}">📚 Materias</a></li>

<li><a th:href="@{/horario}">📅 Horario</a></li>

<li><a th:href="@{/tareas}">📝 Tareas</a></li>

<li><a th:href="@{/examenes}">📖 Exámenes</a></li>

<li><a th:href="@{/notas}">📊 Notas</a></li>

<li><a th:href="@{/calendario}">📆 Calendario</a></li>

<li><a th:href="@{/configuracion}">⚙ Configuración</a></li>

</ul>

    </aside>

    <!-- Contenido -->
    <main class="contenido">
        
        <div class="topbar">

    <div id="fecha"></div>

    <div class="acciones">

        <button id="modoOscuro">🌙</button>

        <span id="hora"></span>

    </div>

</div>

        <header>

            <h1>Bienvenido</h1>

            <p>Agenda Estudiantil PWA</p>

        </header>

        <section class="cards">

            <div class="cards">

    <div class="card">
        <h3>📚 Materias</h3>
        <h2 id="totalMaterias">0</h2>
    </div>

    <div class="card">
        <h3>📝 Tareas Pendientes</h3>
        <h2 id="totalTareas">0</h2>
    </div>

    <div class="card">
        <h3>📅 Clases</h3>
        <h2 id="totalHorario">0</h2>
    </div>

    <div class="card">
        <h3>📊 Promedio</h3>
        <h2 id="promedio">0.00</h2>
    </div>

</div>

        </section>

        <section class="panel">

            <div class="panel1">

    <h2>📌 Próximas actividades</h2>

    <ul id="actividades">

    </ul>

</div>

            <div class="panel2">

                <h2>Calendario</h2>

                <div class="calendario">

                    Próximamente...

                </div>

            </div>

        </section>

    </main>

</div>
    
    <script src="js/app.js"></script>

<script src="js/dashboard.js"></script>
    
    <script>

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register("/sw.js")

        .then(()=>{

            console.log("Service Worker registrado");

        })

        .catch(error=>{

            console.log(error);

        });

    });

}

</script>

</body>

</html>
