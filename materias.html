<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materias</title>

    <link rel="stylesheet" href="css/style.css">
    
    <link rel="manifest" href="./manifest.webmanifest">

<meta name="theme-color" content="#1565C0">

<link rel="icon" href="./img/icon-192.png">
</head>

<body>

<div class="contenido">

    <h1>📚 Materias</h1>

    <br>

    <form id="formMateria">

        <input type="text" id="nombre" placeholder="Nombre de la materia" required>

        <input type="text" id="profesor" placeholder="Profesor">

        <input type="text" id="aula" placeholder="Aula">

        <input type="color" id="color" value="#1565C0">

        <button type="submit">Agregar</button>

    </form>

    <br>

    <table id="tablaMaterias">

        <thead>

        <tr>

            <th>Color</th>
            <th>Materia</th>
            <th>Profesor</th>
            <th>Aula</th>
            <th>Acción</th>

        </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

    <br>

    <a href="index.html">← Volver al inicio</a>

</div>

<script src="js/materias.js"></script>

<script>

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register("./sw.js")

        .then(()=>{

            console.log("Service Worker registrado");

        })

        .catch(error=>{

            console.log(error);

        });

    });

}

</script>

</body>

</html>
